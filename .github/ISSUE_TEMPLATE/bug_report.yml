name: Bug report
description: Report an error, typo, or issue in the manuscript
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: |
        - `[typo]`: spelling, grammar, or rendering errors
        - `[error]`: mathematical or factual mistakes
        - `[confusion]`: unclear passages needing rewording or extra explanation
        - `[notation]`: inconsistent or undeclared notation
        - `[exercise]`: suggestions for new exercises or problems with existing ones
        - `[attribution]`: missing or incorrect credits
        - `[suggestion]`: ideas for improving an explanation, adding an analogy, or covering a related topic
      options:
        - typo
        - error
        - confusion
        - notation
        - exercise
        - attribution
        - suggestion
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version (build)
      description: Found on the review copy notice and on the header.
      placeholder: 0.10.1 (a1b2c3d)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong, and where (chapter, section, page)?
    validations:
      required: true
